<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="theme-color" content="#4B3FE3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>医智学 - 肌骨康复学习</title>
<style>
/* ===== 全局变量 - 医疗蓝色系主题 ===== */
:root {
  --primary: #4B3FE3;
  --primary-light: #6B5FEB;
  --primary-dark: #3A2FC9;
  --primary-bg: #EEEDFC;
  --bg: #F4F5FA;
  --card-bg: #FFFFFF;
  --text: #1A1A2E;
  --text-secondary: #6B7280;
  --text-tertiary: #9CA3AF;
  --border: #E8E9F0;
  --success: #10B981;
  --success-bg: #E6F9F1;
  --error: #EF4444;
  --error-bg: #FDECEC;
  --warning: #F59E0B;
  --warning-bg: #FEF3E2;
  --info: #3B82F6;
  --shadow-sm: 0 1px 3px rgba(75, 63, 227, 0.06);
  --shadow: 0 2px 8px rgba(75, 63, 227, 0.08);
  --shadow-lg: 0 6px 20px rgba(75, 63, 227, 0.12);
  --radius-sm: 8px;
  --radius: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --gradient: linear-gradient(135deg, #4B3FE3 0%, #6B5FEB 100%);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", Roboto, sans-serif;
  background: #E0E2EC;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  font-size: 15px;
  line-height: 1.5;
}

body {
  max-width: 430px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
  background: var(--bg);
  box-shadow: 0 0 40px rgba(0,0,0,0.08);
  padding-bottom: 76px;
}

/* ===== 加载动画 ===== */
.loading-overlay {
  position: fixed;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  height: 100%;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  transition: opacity 0.3s ease;
}
.loading-overlay.hide {
  opacity: 0;
  pointer-events: none;
}
.spinner {
  width: 52px;
  height: 52px;
  border: 4px solid var(--primary-bg);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 18px;
}
.spinner-pulse {
  position: relative;
  width: 70px;
  height: 70px;
  margin-bottom: 22px;
}
.spinner-pulse .ring {
  position: absolute;
  inset: 0;
  border: 3px solid var(--primary);
  border-radius: 50%;
  opacity: 0.6;
  animation: pulse 1.4s ease-out infinite;
}
.spinner-pulse .ring:nth-child(2) { animation-delay: 0.4s; }
.spinner-pulse .ring:nth-child(3) { animation-delay: 0.8s; }
.spinner-pulse .core {
  position: absolute;
  inset: 22px;
  background: var(--gradient);
  border-radius: 50%;
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse {
  0% { transform: scale(0.5); opacity: 0.8; }
  100% { transform: scale(1.4); opacity: 0; }
}
.loading-text {
  color: var(--primary);
  font-weight: 600;
  font-size: 16px;
  letter-spacing: 0.5px;
}
.loading-sub {
  color: var(--text-tertiary);
  font-size: 13px;
  margin-top: 8px;
}

/* ===== 错误提示 ===== */
.error-overlay {
  position: fixed;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  height: 100%;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9998;
  padding: 32px;
  text-align: center;
}
.error-icon {
  font-size: 56px;
  margin-bottom: 16px;
}
.error-text {
  color: var(--error);
  font-size: 17px;
  font-weight: 600;
  margin-bottom: 8px;
}
.error-sub {
  color: var(--text-secondary);
  font-size: 13px;
  margin-bottom: 24px;
}
.btn-reload {
  background: var(--gradient);
  color: #fff;
  border: none;
  padding: 12px 32px;
  border-radius: var(--radius);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: var(--shadow);
}

/* ===== 顶部导航栏 ===== */
.top-nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--gradient);
  color: #fff;
  padding: 14px 16px;
  padding-top: calc(14px + env(safe-area-inset-top, 0px));
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 12px rgba(75, 63, 227, 0.25);
}
.nav-left {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}
.back-btn {
  background: rgba(255,255,255,0.2);
  border: none;
  color: #fff;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.top-title {
  font-size: 19px;
  font-weight: 700;
  letter-spacing: 0.5px;
}
.nav-right {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.stat-pill {
  background: rgba(255,255,255,0.18);
  padding: 5px 10px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 3px;
  backdrop-filter: blur(6px);
}

/* ===== 页面容器 ===== */
main {
  min-height: calc(100vh - 140px);
}
.page {
  display: none;
  padding: 16px;
  animation: fadeIn 0.25s ease;
}
.page.active {
  display: block;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== 通用卡片 ===== */
.card {
  background: var(--card-bg);
  border-radius: var(--radius-lg);
  padding: 16px;
  box-shadow: var(--shadow-sm);
  margin-bottom: 12px;
  border: 1px solid var(--border);
}
.section-title {
  font-size: 17px;
  font-weight: 700;
  margin: 4px 0 12px;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 6px;
}
.section-title .dot {
  width: 4px;
  height: 16px;
  background: var(--gradient);
  border-radius: 2px;
}

/* ===== 学习方法卡片 ===== */
.method-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 18px;
}
.method-card {
  background: var(--card-bg);
  border-radius: var(--radius-lg);
  padding: 16px 12px;
  text-align: center;
  cursor: pointer;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  position: relative;
  overflow: hidden;
}
.method-card:active {
  transform: scale(0.97);
}
.method-card .icon {
  font-size: 32px;
  margin-bottom: 8px;
  display: block;
}
.method-card .name {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 3px;
}
.method-card .desc {
  font-size: 11px;
  color: var(--text-tertiary);
  line-height: 1.3;
}
.method-card.feynman { background: linear-gradient(135deg, #fff 60%, #EEEDFC 100%); }
.method-card.simon { background: linear-gradient(135deg, #fff 60%, #E6F9F1 100%); }
.method-card.sq3r { background: linear-gradient(135deg, #fff 60%, #FEF3E2 100%); }
.method-card.quiz { background: linear-gradient(135deg, #fff 60%, #FDECEC 100%); }

/* ===== 分类标签 ===== */
.tab-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding-bottom: 2px;
}
.tab-bar::-webkit-scrollbar { display: none; }
.cat-tab {
  padding: 7px 16px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 600;
  background: var(--card-bg);
  color: var(--text-secondary);
  border: 1px solid var(--border);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: all 0.15s ease;
}
.cat-tab.active {
  background: var(--gradient);
  color: #fff;
  border-color: transparent;
  box-shadow: var(--shadow);
}

/* ===== 知识点卡片 ===== */
.kp-card {
  background: var(--card-bg);
  border-radius: var(--radius-lg);
  padding: 14px;
  margin-bottom: 10px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: transform 0.12s ease, box-shadow 0.12s ease;
}
.kp-card:active {
  transform: scale(0.98);
  box-shadow: var(--shadow);
}
.kp-card .kp-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 8px;
}
.kp-card .kp-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  flex: 1;
  line-height: 1.35;
}
.kp-card .kp-badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: var(--radius-sm);
  font-weight: 600;
  flex-shrink: 0;
}
.kp-badge.muscle { background: var(--primary-bg); color: var(--primary); }
.kp-badge.disease { background: var(--error-bg); color: var(--error); }
.kp-card .kp-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 6px;
}
.kp-meta .meta-item {
  font-size: 11px;
  color: var(--text-secondary);
  background: var(--bg);
  padding: 2px 8px;
  border-radius: var(--radius-sm);
}
.kp-card .kp-desc {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.kp-card .kp-foot {
  margin-top: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.kp-count {
  font-size: 11px;
  color: var(--primary);
  font-weight: 600;
}
.kp-arrow {
  color: var(--text-tertiary);
  font-size: 14px;
}

/* ===== 题目相关 ===== */
.q-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}
.q-progress {
  font-size: 13px;
  color: var(--text-secondary);
  font-weight: 600;
}
.q-progress .num {
  color: var(--primary);
  font-size: 16px;
}
.q-timer {
  background: var(--primary-bg);
  color: var(--primary);
  padding: 5px 12px;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}
.q-timer.warn { background: var(--warning-bg); color: var(--warning); }
.q-timer.danger { background: var(--error-bg); color: var(--error); }
.q-type-tag {
  display: inline-block;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: var(--radius-sm);
  font-weight: 600;
  margin-bottom: 8px;
}
.q-type-tag.single { background: var(--primary-bg); color: var(--primary); }
.q-type-tag.judge { background: var(--warning-bg); color: var(--warning); }
.q-question {
  font-size: 16px;
  font-weight: 600;
  line-height: 1.55;
  color: var(--text);
  margin-bottom: 16px;
}
.q-options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.q-option {
  background: var(--card-bg);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  font-size: 14px;
  color: var(--text);
  cursor: pointer;
  transition: all 0.15s ease;
  line-height: 1.45;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.q-option:active {
  transform: scale(0.98);
}
.q-option .opt-label {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--bg);
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
  transition: all 0.15s ease;
}
.q-option .opt-text {
  flex: 1;
  padding-top: 2px;
}
.q-option.correct {
  border-color: var(--success);
  background: var(--success-bg);
}
.q-option.correct .opt-label {
  background: var(--success);
  color: #fff;
}
.q-option.wrong {
  border-color: var(--error);
  background: var(--error-bg);
}
.q-option.wrong .opt-label {
  background: var(--error);
  color: #fff;
}
.q-option.disabled {
  pointer-events: none;
  opacity: 0.65;
}
.q-option.disabled.correct, .q-option.disabled.wrong {
  opacity: 1;
}

.feedback {
  margin-top: 14px;
  padding: 12px 14px;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}
.feedback.correct {
  background: var(--success-bg);
  color: var(--success);
}
.feedback.wrong {
  background: var(--error-bg);
  color: var(--error);
}
.feedback .answer-hint {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-top: 2px;
  display: block;
}

/* ===== 按钮 ===== */
.btn-primary {
  background: var(--gradient);
  color: #fff;
  border: none;
  padding: 14px;
  border-radius: var(--radius);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  width: 100%;
  box-shadow: var(--shadow);
  transition: transform 0.12s ease;
  letter-spacing: 0.5px;
}
.btn-primary:active {
  transform: scale(0.98);
}
.btn-primary:disabled {
  opacity: 0.5;
}
.btn-secondary {
  background: var(--card-bg);
  color: var(--primary);
  border: 1.5px solid var(--primary);
  padding: 12px;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  width: 100%;
}
.btn-block {
  width: 100%;
  margin-top: 16px;
}
.btn-row {
  display: flex;
  gap: 10px;
  margin-top: 16px;
}
.btn-row > * { flex: 1; }

/* ===== 开始页 ===== */
.start-screen {
  text-align: center;
  padding: 32px 16px;
}
.start-screen .big-icon {
  font-size: 64px;
  margin-bottom: 16px;
}
.start-screen .start-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
}
.start-screen .start-desc {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 24px;
  line-height: 1.6;
}
.start-info {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 24px;
}
.start-info .info-item {
  text-align: center;
}
.start-info .info-num {
  font-size: 24px;
  font-weight: 700;
  color: var(--primary);
}
.start-info .info-label {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-top: 2px;
}

/* ===== 结果页 ===== */
.result-card {
  background: var(--card-bg);
  border-radius: var(--radius-xl);
  padding: 28px 20px;
  text-align: center;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
}
.result-emoji {
  font-size: 56px;
  margin-bottom: 12px;
}
.result-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
}
.result-score {
  font-size: 40px;
  font-weight: 800;
  color: var(--primary);
  margin: 12px 0;
  font-variant-numeric: tabular-nums;
}
.result-score .small {
  font-size: 20px;
  color: var(--text-tertiary);
}
.result-meta {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin-top: 8px;
}
.result-meta .meta-num {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
}
.result-meta .meta-label {
  font-size: 11px;
  color: var(--text-tertiary);
}

/* ===== 错题本 ===== */
.wrong-item {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 10px;
  border: 1px solid var(--border);
  border-left: 3px solid var(--error);
}
.wrong-item .w-q {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.5;
  margin-bottom: 10px;
}
.wrong-item .w-row {
  font-size: 12px;
  margin-bottom: 4px;
  display: flex;
  gap: 6px;
}
.wrong-item .w-label {
  color: var(--text-tertiary);
  flex-shrink: 0;
  font-weight: 600;
}
.wrong-item .w-user {
  color: var(--error);
  font-weight: 600;
  word-break: break-all;
}
.wrong-item .w-correct {
  color: var(--success);
  font-weight: 600;
  word-break: break-all;
}
.wrong-item .w-foot {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px dashed var(--border);
}
.wrong-item .w-time {
  font-size: 11px;
  color: var(--text-tertiary);
}
.wrong-item .w-del {
  background: var(--error-bg);
  color: var(--error);
  border: none;
  padding: 5px 12px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
}

/* ===== 统计页 ===== */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}
.stat-card {
  background: var(--card-bg);
  border-radius: var(--radius-lg);
  padding: 16px;
  text-align: center;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
}
.stat-card .s-icon {
  font-size: 24px;
  margin-bottom: 6px;
}
.stat-card .s-num {
  font-size: 26px;
  font-weight: 800;
  color: var(--primary);
  font-variant-numeric: tabular-nums;
}
.stat-card .s-label {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 2px;
}
.mastery-bar-wrap {
  margin-bottom: 14px;
}
.mastery-head {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  margin-bottom: 6px;
}
.mastery-head .m-name {
  font-weight: 600;
  color: var(--text);
}
.mastery-head .m-pct {
  font-weight: 700;
  color: var(--primary);
}
.mastery-bar {
  height: 8px;
  background: var(--border);
  border-radius: 4px;
  overflow: hidden;
}
.mastery-fill {
  height: 100%;
  background: var(--gradient);
  border-radius: 4px;
  transition: width 0.5s ease;
}
.badge-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}
.badge {
  text-align: center;
}
.badge .b-icon {
  font-size: 32px;
  filter: grayscale(1);
  opacity: 0.4;
  margin-bottom: 4px;
}
.badge.unlocked .b-icon {
  filter: none;
  opacity: 1;
}
.badge .b-name {
  font-size: 10px;
  color: var(--text-tertiary);
  line-height: 1.2;
}
.badge.unlocked .b-name {
  color: var(--text);
  font-weight: 600;
}

/* ===== 弹窗 ===== */
.modal-mask {
  position: fixed;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn 0.2s ease;
}
.modal-content {
  background: #fff;
  border-radius: var(--radius-xl);
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.modal-head {
  padding: 16px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: #fff;
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
}
.modal-head .m-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
}
.modal-close {
  background: var(--bg);
  border: none;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  font-size: 16px;
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal-body {
  padding: 18px;
}
.flashcard {
  background: var(--gradient);
  border-radius: var(--radius-lg);
  padding: 24px 18px;
  color: #fff;
  text-align: center;
  margin-bottom: 14px;
  min-height: 160px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.flashcard .fc-label {
  font-size: 12px;
  opacity: 0.85;
  margin-bottom: 10px;
  letter-spacing: 1px;
}
.flashcard .fc-value {
  font-size: 15px;
  line-height: 1.6;
  font-weight: 500;
}
.fc-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
}
.fc-nav button {
  background: var(--primary-bg);
  color: var(--primary);
  border: none;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
}
.fc-nav button:disabled {
  opacity: 0.4;
}
.fc-index {
  font-size: 13px;
  color: var(--text-secondary);
  font-weight: 600;
}
.fc-actions {
  margin-top: 14px;
  display: flex;
  gap: 8px;
}

/* 详情列表 */
.detail-list .d-row {
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.detail-list .d-row:last-child { border-bottom: none; }
.detail-list .d-label {
  font-size: 12px;
  color: var(--text-tertiary);
  font-weight: 600;
  margin-bottom: 4px;
}
.detail-list .d-value {
  font-size: 14px;
  color: var(--text);
  line-height: 1.55;
}

/* 学习方法引导 */
.method-guide {
  text-align: center;
}
.method-guide .mg-icon {
  font-size: 48px;
  margin-bottom: 10px;
}
.method-guide .mg-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 12px;
}
.method-guide .mg-step {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  padding: 10px 0;
  text-align: left;
  border-bottom: 1px solid var(--border);
}
.method-guide .mg-step:last-child { border-bottom: none; }
.method-guide .mg-num {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--gradient);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
}
.method-guide .mg-text {
  font-size: 13px;
  color: var(--text);
  line-height: 1.5;
  padding-top: 3px;
}

/* 空状态 */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-tertiary);
}
.empty-state .e-icon {
  font-size: 56px;
  margin-bottom: 12px;
  opacity: 0.5;
}
.empty-state .e-text {
  font-size: 14px;
}

/* 暂停遮罩 */
.pause-mask {
  position: fixed;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  height: 100%;
  background: rgba(0,0,0,0.65);
  z-index: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  color: #fff;
}
.pause-mask .p-icon { font-size: 56px; margin-bottom: 12px; }
.pause-mask .p-text { font-size: 18px; font-weight: 600; margin-bottom: 20px; }

/* ===== 底部导航栏 ===== */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  background: var(--card-bg);
  display: flex;
  border-top: 1px solid var(--border);
  box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.tab {
  flex: 1;
  background: none;
  border: none;
  padding: 8px 2px 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  cursor: pointer;
  color: var(--text-tertiary);
  transition: color 0.15s ease;
}
.tab .tab-icon {
  font-size: 20px;
  line-height: 1;
}
.tab .tab-label {
  font-size: 10px;
  font-weight: 600;
}
.tab.active {
  color: var(--primary);
}
.tab.active .tab-icon {
  transform: scale(1.1);
}

/* 答题回顾 */
.review-item {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 12px;
  margin-bottom: 10px;
  border: 1px solid var(--border);
}
.review-item .r-q {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 8px;
  line-height: 1.5;
}
.review-item .r-ans {
  font-size: 12px;
  padding: 4px 8px;
  border-radius: var(--radius-sm);
  margin-bottom: 4px;
}
.review-item .r-ans.user-wrong {
  background: var(--error-bg);
  color: var(--error);
}
.review-item .r-ans.user-right {
  background: var(--success-bg);
  color: var(--success);
}
.review-item .r-ans.correct {
  background: var(--success-bg);
  color: var(--success);
}

.tag-list {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 6px;
}
.tag-list .tag {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 4px;
  background: var(--primary-bg);
  color: var(--primary);
}
</style>
</head>
<body>

<!-- 加载动画 -->
<div id="loadingOverlay" class="loading-overlay">
  <div class="spinner-pulse">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="core"></div>
  </div>
  <div class="loading-text" id="loadingText">正在加载数据...</div>
  <div class="loading-sub" id="loadingSub">正在准备肌骨康复知识库</div>
</div>

<!-- 错误提示 -->
<div id="errorOverlay" class="error-overlay" style="display:none">
  <div class="error-icon">⚠️</div>
  <div class="error-text" id="errorText">加载超时</div>
  <div class="error-sub" id="errorSub">请检查网络连接后重试</div>
  <button class="btn-reload" onclick="location.reload()">重新加载</button>
</div>

<!-- 顶部导航栏 -->
<header class="top-nav">
  <div class="nav-left">
    <button class="back-btn" id="backBtn" onclick="navBack()" style="display:none">‹</button>
    <span class="top-title" id="topTitle">医智学</span>
  </div>
  <div class="nav-right">
    <span class="stat-pill">🪙 <span id="coinCount">0</span></span>
    <span class="stat-pill">📅 <span id="studyDays">0</span>天</span>
    <span class="stat-pill">⭐ Lv.<span id="levelDisplay">1</span></span>
  </div>
</header>

<!-- 页面主体 -->
<main>
  <section id="page-home" class="page active"></section>
  <section id="page-daily" class="page"></section>
  <section id="page-exam" class="page"></section>
  <section id="page-wrong" class="page"></section>
  <section id="page-stats" class="page"></section>
</main>

<!-- 弹窗容器 -->
<div id="modalContainer"></div>

<!-- 底部导航栏 -->
<nav class="bottom-nav">
  <button class="tab active" data-tab="home" onclick="switchTab('home')">
    <span class="tab-icon">🏠</span>
    <span class="tab-label">首页</span>
  </button>
  <button class="tab" data-tab="daily" onclick="switchTab('daily')">
    <span class="tab-icon">✅</span>
    <span class="tab-label">每日打卡</span>
  </button>
  <button class="tab" data-tab="exam" onclick="switchTab('exam')">
    <span class="tab-icon">📝</span>
    <span class="tab-label">考试</span>
  </button>
  <button class="tab" data-tab="wrong" onclick="switchTab('wrong')">
    <span class="tab-icon">📒</span>
    <span class="tab-label">错题本</span>
  </button>
  <button class="tab" data-tab="stats" onclick="switchTab('stats')">
    <span class="tab-icon">📊</span>
    <span class="tab-label">统计</span>
  </button>
</nav>
